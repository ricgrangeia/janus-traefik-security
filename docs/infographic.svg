<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="traefik-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="janus-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#1a0a3d"/>
    </linearGradient>
    <linearGradient id="module-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#e0e7ff" letter-spacing="3">JANUS</text>
  <text x="450" y="62" text-anchor="middle" font-size="11" fill="#6366f1" letter-spacing="2">TRAEFIK SECURITY BRIDGE  ·  v0.1.0</text>

  <!-- ── proxy-network boundary ──────────────────────────────────────── -->
  <rect x="30" y="85" width="840" height="330" rx="10" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="44" y="102" font-size="10" fill="#374151" letter-spacing="1">proxy-network  (external Docker network)</text>

  <!-- ══ INTERNET / CLIENT ══ -->
  <rect x="50" y="120" width="130" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="115" y="148" text-anchor="middle" font-size="22">🌐</text>
  <text x="115" y="168" text-anchor="middle" font-size="10" fill="#9ca3af">Internet</text>
  <text x="115" y="182" text-anchor="middle" font-size="9" fill="#4b5563">HTTP / HTTPS traffic</text>

  <!-- Arrow: Internet → Traefik -->
  <line x1="180" y1="155" x2="228" y2="155" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- ══ TRAEFIK CONTAINER ══ -->
  <rect x="230" y="100" width="180" height="230" rx="10" fill="url(#traefik-grad)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="320" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd" letter-spacing="1">TRAEFIK</text>
  <text x="320" y="142" text-anchor="middle" font-size="9" fill="#3b82f6">container: traefik</text>

  <!-- Traefik internals -->
  <rect x="248" y="155" width="144" height="32" rx="5" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="320" y="170" text-anchor="middle" font-size="9" fill="#60a5fa">Entrypoints</text>
  <text x="320" y="182" text-anchor="middle" font-size="8" fill="#374151">:80  :443</text>

  <rect x="248" y="195" width="144" height="32" rx="5" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="320" y="210" text-anchor="middle" font-size="9" fill="#60a5fa">Routers + Middlewares</text>
  <text x="320" y="222" text-anchor="middle" font-size="8" fill="#374151">Docker label provider</text>

  <rect x="248" y="235" width="144" height="32" rx="5" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="320" y="250" text-anchor="middle" font-size="9" fill="#60a5fa">/api/rawdata</text>
  <text x="320" y="262" text-anchor="middle" font-size="8" fill="#374151">REST API  :8080</text>

  <rect x="248" y="275" width="144" height="32" rx="5" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="320" y="290" text-anchor="middle" font-size="9" fill="#60a5fa">/metrics</text>
  <text x="320" y="302" text-anchor="middle" font-size="8" fill="#374151">Prometheus  :8080</text>

  <!-- Arrow: Traefik API → Janus (rawdata) -->
  <line x1="410" y1="248" x2="458" y2="248" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="434" y="241" text-anchor="middle" font-size="8" fill="#6366f1">/rawdata</text>

  <!-- Arrow: Traefik metrics → Janus (pulse) -->
  <line x1="410" y1="292" x2="458" y2="292" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="434" y="285" text-anchor="middle" font-size="8" fill="#6366f1">/metrics</text>

  <!-- ══ JANUS CONTAINER ══ -->
  <rect x="460" y="100" width="320" height="270" rx="10" fill="url(#janus-grad)" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="620" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#c7d2fe" letter-spacing="1">JANUS</text>
  <text x="620" y="142" text-anchor="middle" font-size="9" fill="#818cf8">container: janus  ·  :9090</text>

  <!-- Module: Data Bridge -->
  <rect x="478" y="155" width="284" height="48" rx="6" fill="url(#module-grad)" stroke="#4f46e5" stroke-width="1"/>
  <text x="494" y="174" font-size="10" font-weight="bold" fill="#a5b4fc">Data Bridge</text>
  <text x="494" y="189" font-size="8.5" fill="#6b7280">Fetches /api/rawdata · /api/overview · /metrics · /ping</text>
  <text x="494" y="200" font-size="8" fill="#4b5563">internal/traefik  ·  net/http  ·  5s timeout</text>

  <!-- Module: Security Scorer -->
  <rect x="478" y="212" width="284" height="52" rx="6" fill="url(#module-grad)" stroke="#dc2626" stroke-width="1"/>
  <text x="494" y="231" font-size="10" font-weight="bold" fill="#fca5a5">Security Scorer</text>
  <text x="494" y="246" font-size="8.5" fill="#6b7280">Scans routers · flags missing TLS, auth, rate-limit, IP allowlist</text>
  <text x="494" y="258" font-size="8" fill="#4b5563">internal/security  ·  score 0–100 per router  ·  overall avg</text>

  <!-- Module: Pulse Monitor -->
  <rect x="478" y="273" width="284" height="52" rx="6" fill="url(#module-grad)" stroke="#d97706" stroke-width="1"/>
  <text x="494" y="292" font-size="10" font-weight="bold" fill="#fcd34d">Pulse Monitor</text>
  <text x="494" y="307" font-size="8.5" fill="#6b7280">Parses Prometheus text · alerts on 4xx+5xx error rate spikes</text>
  <text x="494" y="319" font-size="8" fill="#4b5563">internal/pulse  ·  configurable threshold  ·  no dependencies</text>

  <!-- Module: Embedded UI -->
  <rect x="478" y="334" width="284" height="24" rx="6" fill="url(#module-grad)" stroke="#059669" stroke-width="1"/>
  <text x="620" y="350" text-anchor="middle" font-size="9" fill="#6ee7b7">Embedded SPA  ·  //go:embed  ·  Tailwind CSS  ·  30s auto-refresh</text>

  <!-- ══ DEVOPS / DEV USER ══ -->
  <rect x="720" y="120" width="130" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="785" y="148" text-anchor="middle" font-size="22">👥</text>
  <text x="785" y="168" text-anchor="middle" font-size="10" fill="#9ca3af">DevOps + Devs</text>
  <text x="785" y="182" text-anchor="middle" font-size="9" fill="#4b5563">localhost:9090</text>

  <!-- Arrow: Janus → Users -->
  <line x1="780" y1="230" x2="780" y2="192" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="796" y="218" font-size="8" fill="#10b981">Dashboard</text>

  <!-- Arrow: Users → Janus (poll) -->
  <line x1="752" y1="165" x2="720" y2="200" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-gray)"/>
  <text x="730" y="180" font-size="7.5" fill="#4b5563">GET /api/status</text>

  <!-- ══ LEGEND ══ -->
  <rect x="30" y="435" width="840" height="68" rx="8" fill="#0f172a" stroke="#1f2937" stroke-width="1"/>
  <text x="50" y="454" font-size="9" font-weight="bold" fill="#6b7280" letter-spacing="1">LEGEND</text>

  <!-- legend items -->
  <line x1="100" y1="470" x2="130" y2="470" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="135" y="474" font-size="9" fill="#9ca3af">Traefik API poll (read-only)</text>

  <line x1="310" y1="470" x2="340" y2="470" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="345" y="474" font-size="9" fill="#9ca3af">Dashboard response</text>

  <line x1="500" y1="470" x2="530" y2="470" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="535" y="474" font-size="9" fill="#9ca3af">Public traffic / user request</text>

  <rect x="690" y="462" width="10" height="10" rx="2" fill="#dc2626"/>
  <text x="705" y="473" font-size="9" fill="#9ca3af">Security issue</text>

  <rect x="770" y="462" width="10" height="10" rx="2" fill="#d97706"/>
  <text x="785" y="473" font-size="9" fill="#9ca3af">Pulse alert</text>

  <!-- score examples -->
  <text x="50" y="495" font-size="8.5" fill="#6b7280">Score:  </text>
  <rect x="90" y="485" width="32" height="12" rx="3" fill="#10b981" opacity="0.2"/>
  <text x="106" y="495" text-anchor="middle" font-size="8" fill="#10b981">70–100</text>
  <text x="128" y="495" font-size="8" fill="#4b5563"> Secure  </text>
  <rect x="160" y="485" width="32" height="12" rx="3" fill="#d97706" opacity="0.2"/>
  <text x="176" y="495" text-anchor="middle" font-size="8" fill="#d97706">40–69</text>
  <text x="198" y="495" font-size="8" fill="#4b5563"> Needs attention  </text>
  <rect x="278" y="485" width="32" height="12" rx="3" fill="#dc2626" opacity="0.2"/>
  <text x="294" y="495" text-anchor="middle" font-size="8" fill="#dc2626">0–39</text>
  <text x="316" y="495" font-size="8" fill="#4b5563"> Critical</text>

  <text x="750" y="495" text-anchor="end" font-size="8" fill="#374151">github.com/janus-project/janus</text>
</svg>
