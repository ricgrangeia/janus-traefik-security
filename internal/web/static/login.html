<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Janus — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { mono: ['ui-monospace', 'SFMono-Regular', 'monospace'] } } }
    }
  </script>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, monospace; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen dark flex items-center justify-center">
  <main class="w-full max-w-sm px-6">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-bold tracking-widest text-indigo-400">JANUS</h1>
      <p class="text-xs text-gray-500 mt-1">Traefik Security Bridge · Sign in to continue</p>
    </header>

    <form id="login-form" class="space-y-4 bg-gray-900 border border-gray-800 rounded-lg p-6">
      <label class="block">
        <span class="text-xs uppercase tracking-wider text-gray-400">Password</span>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          autofocus
          required
          class="mt-2 w-full px-3 py-2 bg-gray-950 border border-gray-700 rounded text-gray-100 focus:outline-none focus:border-indigo-500"
        />
      </label>

      <button
        type="submit"
        id="submit-btn"
        class="w-full py-2 rounded bg-indigo-600 hover:bg-indigo-500 text-white font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Sign in
      </button>

      <p id="error" class="text-sm text-red-400 hidden"></p>
    </form>

    <p class="text-center text-xs text-gray-600 mt-6">
      Single-admin mode · sessions expire after 8 h of inactivity
    </p>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        if (res.ok) {
          window.location.href = '/';
          return;
        }
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.error || `Sign-in failed (${res.status})`;
        errEl.classList.remove('hidden');
      } catch (err) {
        errEl.textContent = 'Network error — ' + err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
