version: "3.8"

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  proxy-network:
    external: true
  ai-network:
    external: true

# ── Services ──────────────────────────────────────────────────────────────
services:

  janus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: janus
    restart: unless-stopped
    environment:
      TRAEFIK_API_URL: ${TRAEFIK_API_URL:-http://traefik:8080}
      JANUS_PORT: ${JANUS_PORT:-9090}
      JANUS_ALERT_THRESHOLD: ${JANUS_ALERT_THRESHOLD:-0.10}
      # AI analyst — leave VLLM_API_URL unset to run without AI features.
      VLLM_API_URL: ${VLLM_API_URL:-}
      VLLM_MODEL: ${VLLM_MODEL:-qwen2.5-7b-instruct}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      JANUS_AI_INTERVAL: ${JANUS_AI_INTERVAL:-60}
      # Environment label sent to AI for context ("production", "staging", etc.)
      JANUS_ENV: ${JANUS_ENV:-production}
      # Comma-separated list of middleware names considered "trusted/secure".
      JANUS_KNOWN_MIDDLEWARES: ${JANUS_KNOWN_MIDDLEWARES:-traefik-auth,authentik,crowdsec}
      # Path inside the container where AI audit traces are written.
      JANUS_AI_TRACE_PATH: ${JANUS_AI_TRACE_PATH:-/logs/ai_audit_trace.json}
      # Audit history for trend analysis.
      JANUS_HISTORY_PATH: ${JANUS_HISTORY_PATH:-/logs/audit_history.json}
      # Telegram alerts (leave TELEGRAM_BOT_TOKEN empty to disable).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_SEVERITY_THRESHOLD: ${TELEGRAM_SEVERITY_THRESHOLD:-8}
      # Path to user-defined security policies JSON file.
      JANUS_POLICIES_PATH: ${JANUS_POLICIES_PATH:-/configs/policies.json}
      # SQLite database path. Set to empty string to use JSON fallback.
      JANUS_DB_PATH: ${JANUS_DB_PATH:-/app/data/janus.db}
      # Shield: Traefik dynamic-config YAML written by Janus at startup (forwardAuth middleware).
      JANUS_SHIELD_PATH: ${JANUS_SHIELD_PATH:-/rules/janus-middleware.yaml}
      # Shield state: JSON file where Janus persists its blocked IP list across restarts.
      JANUS_SHIELD_STATE_PATH: ${JANUS_SHIELD_STATE_PATH:-/app/data/shield_state.json}
      # Internal URL Traefik uses to reach Janus's /auth endpoint (forwardAuth address).
      JANUS_INTERNAL_URL: ${JANUS_INTERNAL_URL:-http://janus:9090}
      # AI severity threshold (1-10) for automatic IP blocking. Default: 10.
      JANUS_AUTO_BLOCK_MIN: ${JANUS_AUTO_BLOCK_MIN:-10}
      # Path to Traefik's JSON access log inside the Janus container.
      # Must match the mount point of TRAEFIK_LOG_DIR below.
      JANUS_ACCESS_LOG_PATH: ${JANUS_ACCESS_LOG_PATH:-/traefik-logs/access.log}
      # Path to MaxMind GeoLite2-City.mmdb for IP geo-enrichment (optional).
      JANUS_GEOIP_DB_PATH: ${JANUS_GEOIP_DB_PATH:-/app/data/GeoLite2-City.mmdb}
      JANUS_ADMIN_PASSWORD_HASH: ${JANUS_ADMIN_PASSWORD_HASH}
    volumes:
      - /opt/janus/logs:/logs
      - /opt/janus/configs:/configs
      - /opt/janus/data:/app/data
      - /opt/traefik/rules:/rules
      - /opt/GeoIP/data:/app/GeoIP
      # Mount the same host directory that Traefik writes its access log to.
      # In Traefik: volumes: - /var/log/traefik:/var/log
      #             command:  - --accesslog.filePath=/var/log/access.log
      #             IMPORTANT: remove --accessLog.filters.statusCodes to log all requests
      - ${TRAEFIK_LOG_DIR:-/var/log/traefik}:/traefik-logs:ro

    ports:
      - "${JANUS_PORT:-9090}:${JANUS_PORT:-9090}"
    networks:
      - proxy-network
      - ai-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
