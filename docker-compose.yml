version: "3.8"

# ── Networks ──────────────────────────────────────────────────────────────
# "proxy-network" is created and owned by the existing Traefik stack.
# Janus joins it as a read-only participant — it never manages this network.
networks:
  proxy-network:
    external: true
  ai-network:
    external: true


# ── Services ──────────────────────────────────────────────────────────────
services:

  janus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: janus
    restart: unless-stopped
    environment:
      # Override individual vars here or via Portainer stack environment.
      TRAEFIK_API_URL: ${TRAEFIK_API_URL:-http://traefik:8080}
      JANUS_PORT: ${JANUS_PORT:-9090}
      JANUS_ALERT_THRESHOLD: ${JANUS_ALERT_THRESHOLD:-0.10}
      # AI analyst — leave VLLM_API_URL unset to run without AI features.
      VLLM_API_URL: ${VLLM_API_URL:-}
      VLLM_MODEL: ${VLLM_MODEL:-qwen2.5-7b-instruct}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      JANUS_AI_INTERVAL: ${JANUS_AI_INTERVAL:-60}
    ports:
      - "${JANUS_PORT:-9090}:${JANUS_PORT:-9090}"
    networks:
      - proxy-network
      - ai-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
